# version: '3.8'

services:
  mariadb:
    build: ./requirements/mariadb
    image: inception-mariadb
    container_name: mariadb
    volumes:
      - mariadb_data:/var/lib/mysql
    env_file:
      - .env
    secrets:
      - db_user_password
    networks:
      - inception
    restart: unless-stopped

  wordpress:
    build: ./requirements/wordpress
    image: inception-wordpress
    container_name: wordpress
    depends_on:
      - mariadb
    volumes:
      - wordpress_data:/var/www/html
    secrets:
      - db_user_password
      - wp_admin_password
      - wp_user_password
    env_file:
      - .env
    networks:
      - inception
    restart: unless-stopped

  nginx:
    build: ./requirements/nginx
    image: inception-nginx
    container_name: nginx
    depends_on:
      - wordpress
    volumes:
      - wordpress_data:/var/www/html:ro
    ports:
      - "127.0.0.4:443:443"
    networks:
      - inception
    restart: unless-stopped

volumes:
  mariadb_data:
    driver: local
    driver_opts:
      device: /home/abel-baz/data/mariadb
      o: bind
      type: none
  wordpress_data:
    driver: local
    driver_opts:
      device: /home/abel-baz/data/wordpress
      o: bind
      type: none

networks:
  inception:

# mounted at run time
secrets:
  db_user_password:
    file: ../secrets/db_user_password.txt
  wp_admin_password:
    file: ../secrets/wp_admin_password.txt
  wp_user_password:
    file: ../secrets/wp_user_password.txt